*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

});
document.getElementById('paymentModal').addEventListener('click', function(e) {

});

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'status-toast ' + type + ' show';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 4000);
}

async function connectWallet() {
  try {
    // 检测钱包：支持 OKX Web3、TP钱包、Phantom等
    var walletName = '';
    walletProvider = null;  // 先重置，再检测
    if (window.solana && (window.solana.isPhantom || window.solana.isConnected !== undefined)) {
      walletProvider = window.solana;
      walletName = window.solana.isPhantom ? 'Phantom' : 'TP钱包';
    } else if (window.okxwallet && window.okxwallet.solana) {
      walletProvider = window.okxwallet.solana;
      walletName = 'OKX Web3';
    } else if (window.solana) {
      walletProvider = window.solana;
      walletName = 'Web3钱包';
    } else {
      showToast('未检测到Web3钱包，请在OKX钱包或TP钱包浏览器中打开', 'error');
      return;
    }
    
    const resp = await walletProvider.connect();
    walletPublicKey = resp.publicKey;
    walletConnected = true;
    walletProviderType = walletName;
    updateWalletUI();
    showToast(walletName + '已连接: ' + walletPublicKey.toString().slice(0,6) + '...' + walletPublicKey.toString().slice(-4), 'success');
  } catch(e) {
    console.error('Wallet connect failed:', e);
    if (e.code === 4001) {
      showToast('用户取消了连接', 'info');
    } else {
      showToast('钱包连接失败，请确保已安装Web3钱包', 'error');
    }
  }
}

function updateWalletUI() {
  const btn = document.getElementById('btnWallet');
  const status = document.getElementById('walletStatus');
  if (walletConnected && walletPublicKey) {
    btn.classList.add('connected');
    status.textContent = walletPublicKey.toString().slice(0,4) + '...' + walletPublicKey.toString().slice(-4);
  } else {
    btn.classList.remove('connected');
    status.textContent = '连接钱包';
  }
}

  }
}

  const message = document.createElement('div');
  message.className = 'chat-message ' + role;
  message.textContent = text;
  chatBody.appendChild(message);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question) return;
  appendChat('user', question);
  input.value = '';
  const answer = generateAiResponse(question);
  setTimeout(() => appendChat('assistant', answer), 250);
}

async function getOrCreateATA(mint, owner, payer) {
  const [ata] = solWeb3.PublicKey.findProgramAddressSync(
    [owner.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), mint.toBuffer()],
    ASSOCIATED_TOKEN_PROGRAM_ID
  );
  try {
    await connection.getTokenAccountBalance(ata);
    return ata;
  } catch(e) {
    if (payer) {
      const tx = new solWeb3.Transaction().add(
        createAssociatedTokenAccountInstruction(payer, ata, owner, mint)
      );
      tx.feePayer = payer;
      const { blockhash } = await connection.getLatestBlockhash();
      tx.recentBlockhash = blockhash;
      const signed = await walletProvider.signTransaction(tx);
      const sig = await connection.sendRawTransaction(signed.serialize());
      await connection.confirmTransaction(sig);
      return ata;
    }
    throw new Error('Recipient token account not found');
  }
}

function createAssociatedTokenAccountInstruction(payer, ata, owner, mint) {
  const keys = [
    { pubkey: payer, isSigner: true, isWritable: true },
    { pubkey: ata, isSigner: false, isWritable: true },
    { pubkey: owner, isSigner: false, isWritable: false },
    { pubkey: mint, isSigner: false, isWritable: false },
    { pubkey: solWeb3.SystemProgram.programId, isSigner: false, isWritable: false },
    { pubkey: TOKEN_PROGRAM_ID, isSigner: false, isWritable: false },
    { pubkey: solWeb3.SYSVAR_RENT_PUBKEY, isSigner: false, isWritable: false }
  ];
  return new solWeb3.TransactionInstruction({
    keys,
    programId: ASSOCIATED_TOKEN_PROGRAM_ID,
    data: new Uint8Array(0)
  });
}

function createTransferInstruction(source, destination, owner, amount) {
  var buf = new ArrayBuffer(9);
  var data = new Uint8Array(buf);
  var view = new DataView(buf);
  data[0] = 3;
  view.setBigUint64(1, BigInt(amount), true);

  const keys = [
    { pubkey: source, isSigner: false, isWritable: true },
    { pubkey: destination, isSigner: false, isWritable: true },
    { pubkey: owner, isSigner: true, isWritable: false }
  ];

  return new solWeb3.TransactionInstruction({
    keys,
    programId: TOKEN_PROGRAM_ID,
    data
  });
}

let solWeb3 = null;

function ensureSolanaLib() {
  if (solWeb3) return solWeb3;
  if (window.solanaWeb3) {
    solWeb3 = window.solanaWeb3;
    initProgramIds();
    console.log('[DAC Store] solana lib ready');
    return solWeb3;
  }
  throw new Error('Solana库未加载，请刷新页面');
}

async function buyProduct(productId) {
  // 阻止事件冒泡，防止弹窗被意外关闭
  if (event) { event.preventDefault(); event.stopPropagation(); }

  if (!walletConnected || !walletPublicKey) {
    showToast('请先连接TP钱包', 'info');
    await connectWallet();
    if (!walletConnected) return;
  }

  // Solana 库已在 <head> 中同步加载，直接使用
  try {
    ensureSolanaLib();
  } catch(e) {
    showToast('Solana库未加载，请刷新页面后重试', 'error');
    return;
  }

  // 直接显示兑换弹窗
  showPaymentModal(productId);
}

async function ensureConnection() {
  const urls = storeConfig.store.rpcUrls;
  for (const url of urls) {
    try {
      const conn = new solWeb3.Connection(url, 'confirmed');
      // 测试连接：获取最新区块高度
      await conn.getBlockHeight();
      console.log('[DAC Store] RPC connected:', url);
      return conn;
    } catch(e) {
      console.warn('[DAC Store] RPC failed:', url, e.message);
    }
  }
  return null;
}

async function executePayment(productId) {
  const p = findProduct(productId);
  if (!p) return;

  const btn = document.getElementById('btnConfirmPay');
  const statusEl = document.getElementById('paymentStatus');
  btn.disabled = true;
  btn.innerHTML = '<span style="animation:spin 1s linear infinite">⟳</span> 处理中...';

  try {
    if (!walletProvider || !walletProvider.isConnected) {
      throw new Error('钱包未连接');
    }

    statusEl.textContent = '正在准备转账...';
    statusEl.style.color = 'var(--text-secondary)';

    const mint = new solWeb3.PublicKey(storeConfig.store.tokenMint);
    const recipient = new solWeb3.PublicKey(storeConfig.store.wallet);
    const decimals = storeConfig.store.tokenDecimals || 6;
    const amount = p.price * 10000 * Math.pow(10, decimals);

    const userATA = solWeb3.PublicKey.findProgramAddressSync(
      [walletPublicKey.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), mint.toBuffer()],
      ASSOCIATED_TOKEN_PROGRAM_ID
    )[0];

    const [recipientATA] = solWeb3.PublicKey.findProgramAddressSync(
      [recipient.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), mint.toBuffer()],
      ASSOCIATED_TOKEN_PROGRAM_ID
    );

    const tx = new solWeb3.Transaction();
    tx.feePayer = walletPublicKey;
    tx.add(createTransferInstruction(userATA, recipientATA, walletPublicKey, amount));
    // 获取近期区块哈希（必须）
    var bhConn = await ensureConnection();
    if (bhConn) {
      var bhResult = await bhConn.getLatestBlockhash();
      tx.recentBlockhash = bhResult.blockhash;
      tx.lastValidBlockHeight = bhResult.lastValidBlockHeight;
    }

    // 判断钱包类型
    var isOkxWallet = walletProviderType.indexOf('OKX') >= 0;

    // OKX钱包直接走 signTransaction + sendRawTransaction（兼容性最好）
    if (isOkxWallet) {
      statusEl.textContent = '请在钱包中确认签名...';
      statusEl.style.color = 'var(--gold-light)';
      // 直接进入签名+发送流程（跳到策略2）
      // (后面共用策略2的逻辑)
    }
    // 非OKX钱包先尝试 signAndSendTransaction
    else if (typeof walletProvider.signAndSendTransaction === 'function') {
      statusEl.textContent = '请在钱包中确认交易...';
      statusEl.style.color = 'var(--gold-light)';
      
      var sigResult = null;
      var sigError = null;
      try {
        sigResult = await walletProvider.signAndSendTransaction(tx, { skipPreflight: true });
        console.log('[DAC Store] signAndSendTransaction ok:', sigResult);
      } catch(e) {
        sigError = e;
        console.warn('[DAC Store] signAndSendTransaction error:', e.message, e.code);
      }

      // 用户取消交易
      if (sigError && (sigError.code === 4001 || (sigError.message && sigError.message.indexOf('cancel') >= 0))) {
        throw new Error('用户取消了交易');
      }

      // 如果没抛异常 → TP钱包内部已完成签名+发送，交易已上链！
      if (!sigError) {
        // 提取签名（各种可能格式）
        var sig = null;
        if (sigResult) {
          sig = typeof sigResult === 'string' ? sigResult : (sigResult.signature || sigResult.txid || sigResult.txId || sigResult.txSignature || '');
        }

        if (sig) {
          statusEl.innerHTML = `
            <div style="font-size:40px;margin-bottom:12px">✅</div>
            <div style="color:var(--success);font-weight:600;font-size:15px;margin-bottom:8px">兑换已提交!</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">
              已兑换 ${p.price.toLocaleString()} 万DAC · ${p.name}
            </div>
            <a class="tx-link" href="https://solscan.io/tx/${sig}" target="_blank">
              查看链上交易: ${sig.slice(0,12)}...${sig.slice(-8)}
            </a>
            <div style="font-size:11px;color:var(--text-muted);margin-top:8px">交易已提交，等待链上确认</div>
          `;
        } else {
          // 无签名但钱包未报错 → 交易已由钱包内部提交
          statusEl.innerHTML = `
            <div style="font-size:40px;margin-bottom:12px">✅</div>
            <div style="color:var(--success);font-weight:600;font-size:15px;margin-bottom:8px">兑换已提交!</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">
              已兑换 ${p.price.toLocaleString()} 万DAC · ${p.name}
            </div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:12px;line-height:1.8">
              交易已通过钱包提交到Solana链<br>
              <a class="tx-link" href="https://solscan.io/account/${storeConfig.store.wallet}" target="_blank">
                可在钱包账户查看最新交易记录 →
              </a>
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px">预计10-30秒内链上确认</div>
          `;
        }
        statusEl.style.color = 'var(--success)';
        btn.style.display = 'none';
        updatePaymentSteps(4);
        showToast('兑换已提交! 万DAC转账处理中...', 'success');
        return;
      }
      
      // signAndSendTransaction 真实失败（网络或合约错误）→ 降级
      console.warn('[DAC Store] signAndSendTransaction failed, falling back:', sigError.message);
    }

    // 策略2：signTransaction + sendTransaction（钱包内置发送能力，不依赖外部RPC）
    statusEl.textContent = '正在签名交易...';
    statusEl.style.color = 'var(--text-secondary)';

    var signedTx;
    try {
      signedTx = await walletProvider.signTransaction(tx);
      console.log('[DAC Store] signTransaction ok');
    } catch(e) {
      console.warn('[DAC Store] signTransaction error:', e.message);
      if (e.code === 4001) throw new Error('用户取消了签名');
      throw new Error('签名失败: ' + e.message);
    }

    // 尝试用钱包内置 sendTransaction 发送（不依赖外部RPC）
    if (typeof walletProvider.sendTransaction === 'function') {
      statusEl.textContent = '钱包内置通道发送中...';
      statusEl.style.color = 'var(--gold-light)';
      try {
        sig2Result = await walletProvider.sendTransaction(signedTx, connection || undefined, { skipPreflight: true });
        console.log('[DAC Store] sendTransaction result:', sig2Result);
        var sig = null;
        if (sig2Result) {
          sig = typeof sig2Result === 'string' ? sig2Result : (sig2Result.signature || sig2Result.txid || '');
        }
        if (sig) {
          statusEl.innerHTML = `
            <div style="font-size:40px;margin-bottom:12px">✅</div>
            <div style="color:var(--success);font-weight:600;font-size:15px;margin-bottom:8px">兑换已提交!</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">
              已兑换 ${p.price.toLocaleString()} 万DAC · ${p.name}
            </div>
            <a class="tx-link" href="https://solscan.io/tx/${sig}" target="_blank">
              查看链上交易: ${sig.slice(0,12)}...${sig.slice(-8)}
            </a>
            <div style="font-size:11px;color:var(--text-muted);margin-top:8px">交易已提交，等待链上确认</div>
          `;
          statusEl.style.color = 'var(--success)';
          btn.style.display = 'none';
          updatePaymentSteps(4);
          showToast('兑换已提交! ' + sig.slice(0,8) + '...', 'success');
          return;
        }
      } catch(e) {
        console.warn('[DAC Store] sendTransaction error:', e.message);
      }
    }

    // 策略3：signTransaction 后用 RPC 发送（最后手段）
    statusEl.textContent = 'RPC通道发送中...';
    // 多端点重试，不阻断
    var conn = null;
    var rpcUrls = storeConfig.store.rpcUrls.concat([
      'https://palpable-dawn-light.solana-mainnet.quiknode.pro/',
      'https://solana-rpc.publicnode.com',
      'https://mainnet.helius-rpc.com/?api-key=c55ca920-d7b4-4b5c-8f9e-2fbb0a6c6e6e'
    ]);

    var sig = null;
    for (var i = 0; i < rpcUrls.length && !sig; i++) {
      try {
        conn = new solWeb3.Connection(rpcUrls[i], 'confirmed');
        sig = await conn.sendRawTransaction(signedTx.serialize(), { skipPreflight: true, maxRetries: 3 });
        console.log('[DAC Store] sendRawTransaction OK via:', rpcUrls[i], 'sig:', sig);
      } catch(e) {
        console.warn('[DAC Store] sendRawTransaction failed via:', rpcUrls[i], e.message);
      }
    }

    if (!sig) {
      throw new Error('所有网络通道均发送失败，请检查网络设置');
    }

    // 尝试确认（非致命，可选）
    try {
      await conn.confirmTransaction(sig, 'processed');
    } catch(e) {
      console.warn('[DAC Store] confirmTransaction failed (non-fatal):', e.message);
    }

    statusEl.innerHTML = `
      <div style="font-size:40px;margin-bottom:12px">✅</div>
      <div style="color:var(--success);font-weight:600;font-size:15px;margin-bottom:8px">兑换成功!</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">
        已兑换 ${p.price.toLocaleString()} 万DAC · ${p.name}
      </div>
      <a class="tx-link" href="https://solscan.io/tx/${sig}" target="_blank">
        查看链上交易: ${sig.slice(0,12)}...${sig.slice(-8)}
      </a>
    `;
    statusEl.style.color = 'var(--success)';
    btn.style.display = 'none';
    updatePaymentSteps(4);
    showToast('兑换成功! ' + p.price.toLocaleString() + ' 万DAC 已到账', 'success');

  } catch(e) {
    console.error('Payment failed:', e);
    statusEl.textContent = '兑换失败: ' + (e.message || '请重试');
    statusEl.style.color = 'var(--danger)';
    btn.disabled = false;
    btn.innerHTML = '<span>🔐</span> 重试兑换';
    showToast('兑换失败: ' + (e.message || '未知错误'), 'error');
  }
}

function updatePaymentSteps(activeStep) {
  const steps = document.querySelectorAll('.payment-step');
  steps.forEach((step, i) => {
    step.classList.remove('active', 'done');
    if (i + 1 < activeStep) step.classList.add('done');
    if (i + 1 === activeStep) step.classList.add('active');
  });
}

// 钱包事件监听 & 自动检测
function setupWalletListeners() {
  var solProvider = null;
  if (window.okxwallet && window.okxwallet.solana) {
    solProvider = window.okxwallet.solana;
  } else if (window.solana) {
    solProvider = window.solana;
  } else {
    return;
  }
  walletProvider = solProvider;
  
  solProvider.on('connect', () => {
    walletPublicKey = solProvider.publicKey;
    walletConnected = true;
    updateWalletUI();
  });
  solProvider.on('disconnect', () => {
    walletPublicKey = null;
    walletConnected = false;
    updateWalletUI();
    showToast('钱包已断开连接', 'info');
  });
  if (solProvider.isConnected) {
    walletPublicKey = solProvider.publicKey;
    walletConnected = true;
    updateWalletUI();
  }
}

setupWalletListeners();

// 页面初始化：加载 Solana 库（已在 <head> 同步引入）
if (window.solanaWeb3) {
  solWeb3 = window.solanaWeb3;
  initProgramIds();
  console.log('[DAC Store] solanaWeb3 initialized on page load');
}

initStore();
</script>
